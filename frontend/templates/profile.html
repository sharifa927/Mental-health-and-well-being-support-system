{% extends 'base.html' %}
{% load static %}

{% block title %}Profile - Mental Health Support{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4"><i class="fas fa-user text-primary"></i> My Profile</h2>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-user-circle"></i> Profile Information</h5>
                </div>
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="https://ui-avatars.com/api/?name=Sharifa+Ali&size=120&background=0D6EFD&color=fff" class="rounded-circle mb-3" alt="Profile">
                        <h4>Sharifa Mohamed Ali</h4>
                        <p class="text-muted">sharifaali927@gmail.com</p>
                    </div>
                    
                    <form>
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control" id="fullName" value="Sharifa Mohamed Ali">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control" id="email" value="sharifaali927@gmail.com">
                        </div>
                        
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-bold">Phone Number</label>
                            <input type="tel" class="form-control" id="phone" placeholder="Enter phone number">
                        </div>
                        
                        <div class="mb-3">
                            <label for="dob" class="form-label fw-bold">Date of Birth</label>
                            <input type="date" class="form-control" id="dob">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Profile
                            </button>
                            <button type="button" class="btn btn-outline-danger">
                                <i class="fas fa-lock"></i> Change Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
