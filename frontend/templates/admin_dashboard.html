<div class="row mb-4">
    <div class="col-md-3 col-6 mb-3">
        <div class="card bg-primary text-white stat-card">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-users"></i> Users</h5>
                <h2 class="mb-0">{{ total_users|default:0 }}</h2>
                <small>Total registered</small>
            </div>
        </div>
    </div>
    <div class="col-md-3 col-6 mb-3">
        <div class="card bg-success text-white stat-card">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-user-md"></i> Counselors</h5>
                <h2 class="mb-0">{{ total_counselors|default:0 }}</h2>
                <small>Active counselors</small>
            </div>
        </div>
    </div>
    <div class="col-md-3 col-6 mb-3">
        <div class="card bg-info text-white stat-card">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-calendar-check"></i> Appointments</h5>
                <h2 class="mb-0">{{ total_appointments|default:0 }}</h2>
                <small>Total appointments</small>
            </div>
        </div>
    </div>
    <div class="col-md-3 col-6 mb-3">
        <div class="card bg-warning text-white stat-card">
            <div class="card-body">
                <h5 class="card-title"><i class="fas fa-book"></i> Resources</h5>
                <h2 class="mb-0">{{ total_resources|default:0 }}</h2>
                <small>Total resources</small>
            </div>
        </div>
    </div>
</div>
